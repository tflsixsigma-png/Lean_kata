<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA Projetos COPASA - Prof. Thiago Lima - Gestão Lean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Kata Card Flip Animation */
        .perspective-1500 { perspective: 1500px; }
        .kata-card-inner {
            position: relative;
            width: 100%;
            height: 620px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .kata-card-flipped { transform: rotateY(180deg); }
        .kata-front, .kata-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        .kata-front {
            background: linear-gradient(145deg, #1e3a8a, #1e40af);
            color: white;
            border: 4px solid #1d4ed8;
            padding: 2rem;
        }
        .kata-back {
            background-color: white;
            color: #1e293b;
            transform: rotateY(180deg);
            border: 4px solid #e2e8f0;
            padding: 1.5rem;
        }

        .chart-container { position: relative; width: 100%; height: 300px; margin: 0 auto; }
        
        .nav-btn { transition: all 0.3s; border-left: 4px solid transparent; }
        .nav-active { background-color: #1e293b; border-left: 4px solid #3b82f6; color: white !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        .theory-section { border-left: 4px solid #3b82f6; padding-left: 1.5rem; margin-bottom: 2rem; }
    </style>
    <!-- Chosen Palette: "COPASA Integrity" - Navy Blue, Azure Water, and Slate Grey. -->
    <!-- Application Structure Plan: 
         - Sidebar para navegação modular.
         - Seções teóricas completas para cada item da ementa.
         - Ferramentas interativas (VSM Calculator, Kata Flip, DVF Radar).
         - Casos de uso específicos da COPASA em cada aba.
    -->
    <!-- Visualization & Content Choices:
         - VSM: Gráfico de barras horizontais empilhadas.
         - Causa Raiz: Gráfico de Pareto.
         - DVF: Gráfico de Radar.
         - CONFIRMATION: NO SVG graphics used. NO Mermaid JS used.
    -->
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-72 bg-slate-950 text-slate-400 hidden lg:flex flex-col shadow-2xl shrink-0">
        <div class="p-8 border-b border-slate-900">
            <div class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-1">MBA Gestão de Projetos</div>
            <h1 class="text-white text-xl font-black leading-tight">Prof. Thiago Lima</h1>
            <div class="mt-2 text-[10px] bg-blue-900/30 text-blue-400 px-2 py-1 rounded w-fit font-bold">COPASA - MG</div>
        </div>

        <nav class="flex-1 overflow-y-auto custom-scroll py-6">
            <ul class="space-y-1">
                <li><button onclick="nav('home')" id="nav-home" class="nav-btn w-full text-left px-8 py-3 hover:text-white flex items-center gap-3">🏠 Início</button></li>
                <li><button onclick="nav('cultura')" id="nav-cultura" class="nav-btn w-full text-left px-8 py-3 hover:text-white flex items-center gap-3">🧠 Cultura Lean</button></li>
                <li><button onclick="nav('vsm')" id="nav-vsm" class="nav-btn w-full text-left px-8 py-3 hover:text-white flex items-center gap-3">🗺️ Mapeamento (VSM)</button></li>
                <li><button onclick="nav('root')" id="nav-root" class="nav-btn w-full text-left px-8 py-3 hover:text-white flex items-center gap-3">🔍 Causa Raiz</button></li>
                <li><button onclick="nav('kata')" id="nav-kata" class="nav-btn w-full text-left px-8 py-3 hover:text-white flex items-center gap-3">🔄 Kata & DVF</button></li>
                <li><button onclick="nav('ferramentas')" id="nav-ferramentas" class="nav-btn w-full text-left px-8 py-3 hover:text-white flex items-center gap-3">🛠️ Ferramentas</button></li>
                <li><button onclick="nav('projetos')" id="nav-projetos" class="nav-btn w-full text-left px-8 py-3 hover:text-white flex items-center gap-3">📊 Lean em Projetos</button></li>
            </ul>
        </nav>
        <div class="p-6 bg-slate-900/20 text-[10px] text-center border-t border-slate-900 italic">2026 &copy; Material Exclusivo MBA</div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto" id="scroll-target">
        <header class="lg:hidden sticky top-0 bg-slate-950 p-4 flex justify-between items-center z-50 text-white shadow-lg">
            <div class="font-bold">Prof. Thiago Lima - MBA</div>
            <button onclick="toggleMobileMenu()" class="text-xl">☰</button>
        </header>

        <div id="content-area" class="p-6 md:p-12 max-w-6xl mx-auto">
            <!-- Dynamic Injection -->
        </div>
    </main>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 bg-slate-950 z-40 hidden flex-col p-8 pt-20">
        <button onclick="nav('home'); toggleMobileMenu()" class="py-4 text-white border-b border-slate-900 text-left">Início</button>
        <button onclick="nav('cultura'); toggleMobileMenu()" class="py-4 text-white border-b border-slate-900 text-left">Cultura</button>
        <button onclick="nav('vsm'); toggleMobileMenu()" class="py-4 text-white border-b border-slate-900 text-left">VSM</button>
        <button onclick="nav('kata'); toggleMobileMenu()" class="py-4 text-white border-b border-slate-900 text-left">Kata & DVF</button>
        <button onclick="nav('ferramentas'); toggleMobileMenu()" class="py-4 text-white border-b border-slate-900 text-left">Ferramentas</button>
        <button onclick="nav('projetos'); toggleMobileMenu()" class="py-4 text-white text-left">Projetos</button>
        <button onclick="toggleMobileMenu()" class="mt-8 bg-blue-600 text-white p-4 rounded-xl">Fechar</button>
    </div>

    <script>
        let charts = {};

        function nav(page) {
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            const activeBtn = document.getElementById(`nav-${page}`);
            if (activeBtn) activeBtn.classList.add('nav-active');
            
            document.getElementById('scroll-target').scrollTop = 0;
            const section = document.createElement('div');
            section.className = 'animate-fade';

            switch(page) {
                case 'home': renderHome(section); break;
                case 'cultura': renderCultura(section); break;
                case 'vsm': renderVSM(section); break;
                case 'root': renderRoot(section); break;
                case 'kata': renderKata(section); break;
                case 'ferramentas': renderFerramentas(section); break;
                case 'projetos': renderProjetos(section); break;
            }
            container.appendChild(section);
        }

        function renderHome(el) {
            el.innerHTML = `
                <div class="mb-12">
                    <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight">Lean no MBA de Projetos COPASA</h2>
                    <p class="text-slate-500 mt-2 text-lg">Guia Interativo de Teoria e Prática - Prof. Thiago Lima</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                    <div class="bg-blue-900 p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                        <div class="relative z-10">
                            <h3 class="text-2xl font-bold mb-4">Mentalidade Enxuta</h3>
                            <p class="opacity-80 text-sm leading-relaxed mb-6">Foco na entrega de valor para o cliente através da eliminação sistemática de desperdícios em obras de saneamento e processos administrativos.</p>
                            <button onclick="nav('cultura')" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-full text-xs font-bold transition-all">Começar Jornada</button>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border flex items-center justify-center">
                        <div class="text-center">
                            <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Empresa Atendida</div>
                            <div class="text-3xl font-black text-blue-700">COPASA</div>
                            <p class="text-xs text-slate-500 mt-2">Água e Esgoto de Minas Gerais</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCultura(el) {
            const wastes = [
                { t: 'Transporte', i: '🚚', d: 'Mover material entre canteiros sem agregar valor.' },
                { t: 'Estoque', i: '📦', d: 'Hidrômetros e tubos parados gerando custo de capital.' },
                { t: 'Movimento', i: '🚶', d: 'Técnico buscando ferramentas longe da vala.' },
                { t: 'Espera', i: '⏳', d: 'Aguardando liberação de projeto ou asfalto.' },
                { t: 'Superprodução', i: '🏭', d: 'Tratar mais água do que a demanda real (perdas).' },
                { t: 'Processamento', i: '🔬', d: 'Burocracia de aprovação de baixa complexidade.' },
                { t: 'Defeitos', i: '❌', d: 'Vazamentos recorrentes em rede recém-implantada.' },
                { t: 'Intelecto', i: '🧠', d: 'Ignorar a experiência do operador de campo.' }
            ];
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-3xl font-bold text-slate-900">Cultura Lean</h2>
                    <p class="text-slate-600 mt-2">Os 5 Princípios e os 8 Desperdícios aplicados ao saneamento.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                    ${wastes.map(w => `
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <div class="text-3xl mb-4">${w.i}</div>
                            <h4 class="font-bold text-slate-800 text-sm mb-1">${w.t}</h4>
                            <p class="text-[10px] text-slate-400 leading-tight">${w.d}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderVSM(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-3xl font-bold text-slate-900">Value Stream Mapping</h2>
                    <p class="text-slate-600 mt-2">Mapeando o fluxo de valor do reparo de vazamento.</p>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div class="space-y-6">
                            <div>
                                <label class="text-[10px] font-bold text-blue-600 uppercase mb-2 block">Tempo VA (Reparo)</label>
                                <input type="number" id="vsm-va" value="40" oninput="updateVSM()" class="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl text-lg font-bold">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-amber-600 uppercase mb-2 block">Tempo NVA (Esperas)</label>
                                <input type="number" id="vsm-nva" value="160" oninput="updateVSM()" class="w-full p-4 bg-amber-50 border-2 border-amber-100 rounded-2xl text-lg font-bold">
                            </div>
                        </div>
                        <div class="flex flex-col justify-center items-center bg-slate-50 p-8 rounded-[2rem]">
                            <div class="text-[10px] text-slate-400 font-bold uppercase mb-2">Eficiência (PCE)</div>
                            <div id="vsm-pce" class="text-6xl font-black text-blue-600">0%</div>
                        </div>
                    </div>
                    <div class="mt-10 h-64 relative"><canvas id="vsmChart"></canvas></div>
                </div>
            `;
            setTimeout(updateVSM, 150);
        }

        function updateVSM() {
            const va = parseFloat(document.getElementById('vsm-va').value) || 0;
            const nva = parseFloat(document.getElementById('vsm-nva').value) || 0;
            const lt = va + nva;
            const pce = lt > 0 ? (va / lt) * 100 : 0;
            document.getElementById('vsm-pce').innerText = pce.toFixed(1) + '%';
            const ctx = document.getElementById('vsmChart');
            if(!ctx) return;
            if (charts.vsm) charts.vsm.destroy();
            charts.vsm = new Chart(ctx.getContext('2d'), {
                type: 'bar', data: { labels: ['Fluxo de Reparo'], datasets: [{ label: 'VA', data: [va], backgroundColor: '#3b82f6' }, { label: 'NVA', data: [nva], backgroundColor: '#f59e0b' }] },
                options: { indexAxis: 'y', scales: { x: { stacked: true }, y: { stacked: true } }, responsive: true, maintainAspectRatio: false }
            });
        }

        function renderRoot(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-3xl font-bold text-slate-900">Análise de Causa Raiz</h2>
                    <p class="text-slate-600 mt-2">Pareto e 5 Porquês para resolver problemas sistêmicos.</p>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border h-full">
                        <h4 class="font-bold mb-4 text-xs uppercase tracking-widest">Pareto: Reclamações Mensais</h4>
                        <div class="h-64 relative"><canvas id="paretoChart"></canvas></div>
                    </div>
                    <div class="bg-slate-900 text-white p-8 rounded-[2.5rem]">
                        <h4 class="font-bold mb-6 text-xs uppercase tracking-widest text-blue-400">Os 5 Porquês (Exemplo)</h4>
                        <div class="space-y-4 text-xs font-medium">
                            <p class="p-3 bg-white/10 rounded-xl">1. Por que a bomba queimou? Sobrecarga no motor.</p>
                            <p class="p-3 bg-white/10 rounded-xl">2. Por que sobrecarregou? O rolamento travou.</p>
                            <p class="p-3 bg-white/10 rounded-xl">3. Por que travou? Falta de lubrificação.</p>
                            <p class="p-3 bg-white/10 rounded-xl">4. Por que faltou? O plano de manutenção falhou.</p>
                            <p class="p-3 bg-blue-600 rounded-xl">5. Por que falhou? <strong>Raiz:</strong> Não houve inspeção Gemba no checklist.</p>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(initPareto, 200);
        }

        function initPareto() {
            const ctx = document.getElementById('paretoChart'); if(!ctx) return;
            if (charts.pareto) charts.pareto.destroy();
            charts.pareto = new Chart(ctx.getContext('2d'), {
                type: 'bar', data: { labels: ['Falta Água', 'Vazamento', 'Contas', 'Qualidade', 'Outros'], datasets: [{ label: 'Qtd', data: [120, 85, 30, 20, 5], backgroundColor: '#1e3a8a' }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderKata(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-3xl font-bold text-slate-900">Toyota Kata & DVF</h2>
                    <p class="text-slate-600 mt-2">A rotina de melhoria e validação de experimentos.</p>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-12">
                    <div class="space-y-6">
                        <h3 class="font-bold text-xs uppercase tracking-widest text-blue-600">Cartão Kata (Frente/Verso)</h3>
                        <div class="perspective-1500" onclick="document.getElementById('k-inner').classList.toggle('kata-card-flipped')">
                            <div id="k-inner" class="kata-card-inner">
                                <div class="kata-front">
                                    <div class="text-[10px] font-bold uppercase mb-4 opacity-70">Frente: Processo</div>
                                    <h4 class="text-2xl font-bold mb-8">O Kata de Melhoria</h4>
                                    <ul class="space-y-4 text-sm font-medium">
                                        <li>1. Entenda a Direção</li>
                                        <li>2. Entenda a Condição Atual</li>
                                        <li>3. Estabeleça a Próxima Condição Alvo</li>
                                        <li>4. Experimente em direção ao Alvo</li>
                                    </ul>
                                    <p class="mt-auto text-center text-[10px] font-bold uppercase opacity-50">Clique para virar</p>
                                </div>
                                <div class="kata-back overflow-y-auto custom-scroll">
                                    <div class="text-[10px] font-bold text-blue-600 uppercase mb-4">Verso: Coaching & Reflexão</div>
                                    <div class="space-y-3 text-[11px] mb-6">
                                        <p>1. Qual é a Condição Alvo?</p>
                                        <p>2. Qual a Condição Atual agora?</p>
                                        <p>3. Quais obstáculos impedem você?</p>
                                        <p>4. Qual o seu Próximo Passo?</p>
                                        <p>5. Quando poderemos ver o aprendizado?</p>
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                        <h5 class="text-[11px] font-bold mb-3 uppercase tracking-tighter">Reflita sobre o Último Passo Feito</h5>
                                        <div class="space-y-3 text-[10px] font-semibold text-slate-700">
                                            <p>a) O que você planejou no seu Último Passo?</p>
                                            <p>b) O que você Esperava?</p>
                                            <p>c) O que você Realmente Aconteceu?</p>
                                            <p>d) O que você Aprendeu?</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border h-full flex flex-col">
                        <h3 class="font-bold text-xs uppercase tracking-widest text-blue-600 mb-6">Framework DVF (Radar)</h3>
                        <div class="space-y-4 mb-8">
                            <div><input type="range" id="d-val" value="7" min="1" max="10" oninput="updateDVF()" class="w-full"> <label class="text-[10px] font-bold uppercase">Desejabilidade</label></div>
                            <div><input type="range" id="v-val" value="6" min="1" max="10" oninput="updateDVF()" class="w-full"> <label class="text-[10px] font-bold uppercase">Viabilidade</label></div>
                            <div><input type="range" id="f-val" value="8" min="1" max="10" oninput="updateDVF()" class="w-full"> <label class="text-[10px] font-bold uppercase">Praticidade (Feasibility)</label></div>
                        </div>
                        <div class="flex-1 min-h-[250px] relative"><canvas id="dvfChart"></canvas></div>
                    </div>
                </div>
            `;
            setTimeout(updateDVF, 200);
        }

        function updateDVF() {
            const d = document.getElementById('d-val').value;
            const v = document.getElementById('v-val').value;
            const f = document.getElementById('f-val').value;
            const ctx = document.getElementById('dvfChart'); if(!ctx) return;
            if (charts.dvf) charts.dvf.destroy();
            charts.dvf = new Chart(ctx.getContext('2d'), {
                type: 'radar', data: { labels: ['D','V','F'], datasets: [{ data: [d, v, f], backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6' }] },
                options: { scales: { r: { min: 0, max: 10, ticks: { display: false } } }, responsive: true, maintainAspectRatio: false }
            });
        }

        function renderFerramentas(el) {
            const tools = [
                { n: '5S', d: 'Organização e disciplina operacional.', c: 'Seiri, Seiton, Seiso, Seiketsu, Shitsuke.' },
                { n: 'Kanban', d: 'Gestão visual do fluxo de trabalho.', c: 'Puxar o trabalho conforme a demanda.' },
                { n: 'Gemba', d: 'Ir ao local real para entender os fatos.', c: 'Visitar a obra, não gerenciar da sala.' },
                { n: 'Poka-Yoke', d: 'Dispositivos à prova de erro.', c: 'Prevenir falhas na fonte (Engenharia).' },
                { n: 'Kaizen', d: 'Melhoria contínua diária.', c: 'Evento focado para resolver um gargalo.' },
                { n: 'A3', d: 'Relatório de solução de problemas.', c: 'Padronização da comunicação em uma folha.' }
            ];
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-3xl font-bold text-slate-900">Ferramentas Lean</h2>
                    <p class="text-slate-600 mt-2">O toolkit para transformar a operação da COPASA.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${tools.map(t => `
                        <div class="bg-white p-8 rounded-[2.5rem] border hover:shadow-lg transition-all">
                            <h4 class="text-xl font-bold text-blue-700 mb-2">${t.n}</h4>
                            <p class="text-xs font-bold text-slate-800 mb-2">${t.d}</p>
                            <p class="text-[10px] text-slate-500 italic">${t.c}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderProjetos(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-3xl font-bold text-slate-900">Lean em Projetos</h2>
                    <p class="text-slate-600 mt-2">Gestão de infraestrutura com Last Planner System.</p>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                    <div class="bg-blue-50 p-10 rounded-[2.5rem] border border-blue-200">
                        <h4 class="font-bold mb-6 text-xs uppercase tracking-widest text-blue-800">Last Planner System</h4>
                        <div class="space-y-4">
                            <div class="bg-white p-4 rounded-2xl"><strong>Should:</strong> Planejamento Mestre.</div>
                            <div class="bg-white p-4 rounded-2xl"><strong>Can:</strong> Look-ahead (Remoção de Restrições).</div>
                            <div class="bg-white p-4 rounded-2xl border-l-4 border-blue-600"><strong>Will/Did:</strong> Compromissos Semanais e PPC.</div>
                        </div>
                    </div>
                    <div class="bg-white p-10 rounded-[2.5rem] border flex flex-col justify-center text-center shadow-sm">
                        <div class="text-[10px] font-bold text-slate-400 uppercase mb-4">Métrica de Confiabilidade</div>
                        <div class="text-7xl font-black text-slate-900">PPC</div>
                        <p class="text-sm text-slate-500 mt-4">Percentual de Plano Concluído: O coração do Lean Construction.</p>
                    </div>
                </div>
                <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white">
                    <h4 class="font-bold text-blue-400 mb-4 uppercase text-xs">Conclusão Prof. Thiago Lima</h4>
                    <p class="text-sm opacity-80 leading-relaxed italic">"Lean em projetos não é sobre velocidade, é sobre fluxo. Se o fluxo de valor não pára por restrições, a obra termina antes do prazo naturalmente."</p>
                </div>
            `;
        }

        function toggleMobileMenu() {
            const m = document.getElementById('mobile-menu');
            m.classList.toggle('hidden'); m.classList.toggle('flex');
        }

        window.onload = () => nav('home');
    </script>
</body>
</html>
