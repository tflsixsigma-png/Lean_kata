<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA Projetos COPASA - Prof. Thiago Lima - Gestão Lean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f0f9ff; color: #1e293b; }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #0284c7; border-radius: 10px; }

        /* Kata Card Flip Animation */
        .perspective-1500 { perspective: 1500px; }
        .kata-card-inner {
            position: relative;
            width: 100%;
            height: 620px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .kata-card-flipped { transform: rotateY(180deg); }
        .kata-front, .kata-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        .kata-front {
            background: linear-gradient(145deg, #1e3a8a, #1e40af);
            color: white;
            border: 4px solid #1d4ed8;
            padding: 2rem;
        }
        .kata-back {
            background-color: white;
            color: #1e293b;
            transform: rotateY(180deg);
            border: 4px solid #e2e8f0;
            padding: 1.5rem;
        }

        .chart-container { position: relative; width: 100%; height: 280px; margin: 0 auto; }
        
        .nav-btn { transition: all 0.3s; border-left: 4px solid transparent; }
        .nav-active { background-color: #0284c7; border-left: 4px solid #0c4a6e; color: white !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        .theory-section { border-left: 4px solid #0284c7; padding-left: 1.5rem; margin-bottom: 2rem; }
        
        .game-btn { transition: all 0.2s; }
        .game-btn:active { transform: scale(0.95); }

        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th { background-color: #f8fafc; color: #475569; font-weight: 700; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.05em; padding: 1rem; border-bottom: 2px solid #e2e8f0; }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
    </style>
    <!-- Chosen Palette: COPASA Inspired (Blue/Teal/Neutral) - Foco em Saneamento e Profissionalismo -->
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside class="w-72 bg-white shadow-xl hidden md:flex flex-col z-10 shrink-0">
        <div class="p-8 border-b border-gray-100">
            <h1 class="text-2xl font-black text-sky-700 leading-tight">MBA COPASA</h1>
            <p class="text-[10px] text-gray-500 mt-1 font-bold uppercase tracking-widest">Gestão de Projetos & Lean</p>
        </div>
        <nav class="flex-1 overflow-y-auto py-6">
            <ul class="space-y-1">
                <li><button onclick="nav('intro')" id="nav-intro" class="nav-btn w-full text-left px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">1. Alinhamento Estratégico</button></li>
                <li><button onclick="nav('cultura')" id="nav-cultura" class="nav-btn w-full text-left px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">2. Cultura & VA/NVA</button></li>
                <li><button onclick="nav('lab')" id="nav-lab" class="nav-btn w-full text-left px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">3. Laboratório VA/NVA</button></li>
                <li><button onclick="nav('metrics')" id="nav-metrics" class="nav-btn w-full text-left px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">4. Simulador de Métricas</button></li>
                <li><button onclick="nav('vsm')" id="nav-vsm" class="nav-btn w-full text-left px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">5. Construindo o VSM</button></li>
                <li><button onclick="nav('kata')" id="nav-kata" class="nav-btn w-full text-left px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">6. Toyota Kata & DVF</button></li>
            </ul>
        </nav>
        <div class="p-6 border-t border-gray-100 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-sky-600 flex items-center justify-center text-white font-bold text-sm shadow-lg">TL</div>
            <div>
                <p class="text-xs font-bold text-gray-700 leading-none">Prof. Thiago Lima</p>
                <p class="text-[10px] text-gray-400 mt-1 uppercase">Instrutor MBA</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-6 md:p-12" id="scroll-target">
        <div id="content-area" class="max-w-5xl mx-auto">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script>
        // --- Global State ---
        let charts = {};
        let score = 0;
        let currentActivityIndex = 0;

        const activities = [
            { t: "Consertando cano rompido no Gemba", type: "VA", hint: "Transforma o problema em solução para o cliente." },
            { t: "Caminhão parado no trânsito de BH", type: "NVA", hint: "O cliente não paga por trânsito; é um desperdício de logística." },
            { t: "Preenchendo relatório para Arsae-MG", type: "NNVA", hint: "Obrigatório por lei (Não-Agrega Valor Necessário)." },
            { t: "Tratamento físico-químico da água na ETA", type: "VA", hint: "Torna a água potável, agregando valor direto." },
            { t: "Aguardando assinatura do gerente para liberar obra", type: "NVA", hint: "Puro desperdício de tempo e fila." },
            { t: "Retrabalho de recomposição asfáltica", type: "NVA", hint: "Fazer duas vezes o mesmo serviço é desperdício de recurso." },
            { t: "Inspeção de segurança obrigatória", type: "NNVA", hint: "Garante a vida, embora não saia água na torneira por isso." }
        ];

        // --- Navigation ---
        function nav(page) {
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('nav-active', 'text-white');
                btn.classList.add('text-gray-600');
            });
            
            const activeBtn = document.getElementById(`nav-${page}`);
            if (activeBtn) {
                activeBtn.classList.add('nav-active');
                activeBtn.classList.remove('text-gray-600');
            }
            
            const section = document.createElement('div');
            section.className = 'animate-fade';
            container.appendChild(section); // Fix: Append before rendering to avoid ID lookup failures
            
            document.getElementById('scroll-target').scrollTop = 0;

            switch(page) {
                case 'intro': renderIntro(section); break;
                case 'cultura': renderCultura(section); break;
                case 'lab': renderLab(section); break;
                case 'metrics': renderMetrics(section); break;
                case 'vsm': renderVSM(section); break;
                case 'kata': renderKata(section); break;
            }
        }

        function renderIntro(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-3xl font-black text-slate-900 leading-tight">Alinhamento Estratégico: Missão, Visão e Valores no Contexto Lean</h2>
                    <p class="text-slate-500 mt-2">A identidade corporativa da COPASA como alicerce da excelência.</p>
                </div>
                
                <div class="bg-white rounded-3xl shadow-sm p-8 mb-8 border border-slate-100">
                    <p class="text-slate-600 mb-6 leading-relaxed">
                        A identidade corporativa da COPASA serve como o alicerce para a implementação da cultura Lean. Quando a organização define sua missão como a prestação de serviços de saneamento com excelência, ela está, na verdade, definindo o <strong>"Valor"</strong> que o cliente espera receber. No pensamento Lean, qualquer atividade que não contribua diretamente para o cumprimento desta missão é considerada um desperdício. A visão de ser reconhecida como referência em soluções de saneamento exige uma busca incessante pela perfeição, um dos cinco princípios fundamentais do Lean Thinking.
                    </p>
                    
                    <div class="overflow-x-auto rounded-2xl border border-slate-200">
                        <table>
                            <thead>
                                <tr>
                                    <th>Elemento Organizacional</th>
                                    <th>Definição Estratégica COPASA</th>
                                    <th>Interpretação sob a Ótica Lean</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="font-bold text-sky-700">Missão</td>
                                    <td>Prestar serviços de saneamento e gestão de ativos como braço estratégico de Minas Gerais, com ética e integridade.</td>
                                    <td>Focar na entrega de valor máximo ao cidadão, eliminando burocracias que não agregam saúde ou qualidade de vida.</td>
                                </tr>
                                <tr>
                                    <td class="font-bold text-sky-700">Visão</td>
                                    <td>Ser referência em suporte técnico especializado e soluções de saneamento no território mineiro.</td>
                                    <td>Adotar a melhoria contínua (Kaizen) para atingir níveis de desempenho de classe mundial em eficiência operacional.</td>
                                </tr>
                                <tr>
                                    <td class="font-bold text-sky-700">Valores</td>
                                    <td>Responsabilidade, transparência, honestidade, excelência e compromisso com a sustentabilidade social.</td>
                                    <td>Respeito pelas pessoas (operadores e cidadãos) e uso de fatos e dados (transparência) para resolver problemas.</td>
                                </tr>
                                <tr>
                                    <td class="font-bold text-sky-700">Propósito</td>
                                    <td>Gerar valor nas comunidades onde atua através de projetos sociais e ambientais.</td>
                                    <td>Maximizar o impacto social positivo reduzindo o consumo de recursos naturais e financeiros (eco-eficiência).</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderCultura(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-2xl font-bold text-slate-900">Cultura Lean: VA, NVA e NNVA</h2>
                    <p class="text-slate-500">Classificando as atividades para enxergar o desperdício.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="bg-emerald-50 p-6 rounded-[2rem] border-2 border-emerald-100 shadow-sm transition-all hover:shadow-md">
                        <div class="text-emerald-800 font-bold mb-3 flex items-center gap-2 text-lg"><span>✅</span> VA</div>
                        <p class="text-xs text-emerald-700 leading-relaxed font-medium"><strong>Valor Agregado:</strong> Atividades que transformam o produto ou serviço sob a ótica do cliente. É o que o cidadão mineiro realmente quer pagar.</p>
                        <div class="mt-4 p-2 bg-white rounded-xl text-[10px] text-emerald-600 font-bold uppercase border border-emerald-100">Ex: Tratar a água ou consertar o cano.</div>
                    </div>
                    <div class="bg-amber-50 p-6 rounded-[2rem] border-2 border-amber-100 shadow-sm transition-all hover:shadow-md">
                        <div class="text-amber-800 font-bold mb-3 flex items-center gap-2 text-lg"><span>⚠️</span> NNVA</div>
                        <p class="text-xs text-amber-700 leading-relaxed font-medium"><strong>Necessário mas s/ Valor:</strong> Atividades que não agregam valor direto, mas são exigidas por regulação, segurança ou tecnologia atual.</p>
                        <div class="mt-4 p-2 bg-white rounded-xl text-[10px] text-amber-600 font-bold uppercase border border-amber-100">Ex: Auditoria ARSAE ou PCMSO.</div>
                    </div>
                    <div class="bg-red-50 p-6 rounded-[2rem] border-2 border-red-100 shadow-sm transition-all hover:shadow-md">
                        <div class="text-red-800 font-bold mb-3 flex items-center gap-2 text-lg"><span>❌</span> NVA</div>
                        <p class="text-xs text-red-700 leading-relaxed font-medium"><strong>Desperdício:</strong> Atividades que consomem recursos mas não geram valor nenhum. Devem ser o alvo prioritário de eliminação.</p>
                        <div class="mt-4 p-2 bg-white rounded-xl text-[10px] text-red-600 font-bold uppercase border border-red-100">Ex: Espera por material ou retrabalho.</div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><span>💧</span> A Metáfora do Rio no Saneamento</h3>
                    <p class="text-sm text-slate-600 leading-relaxed">
                        No Lean, enxergamos o processo como um rio. O <strong>VA</strong> é a água fluindo livremente da ETA até o reservatório. O <strong>NVA</strong> são as barragens, redemoinhos e obstruções que fazem o serviço demorar e custar caro sem melhorar a qualidade da água entregue.
                    </p>
                </div>
            `;
        }

        function renderLab(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-2xl font-bold text-slate-900">Laboratório de Classificação</h2>
                    <p class="text-slate-500">Pratique a diferenciação entre Valor e Desperdício no contexto COPASA.</p>
                </div>

                <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100 text-center relative overflow-hidden">
                    <div class="flex justify-between items-center mb-8">
                        <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Desafio Lean</span>
                        <div id="game-score" class="bg-sky-100 text-sky-700 px-4 py-1 rounded-full font-bold text-xs shadow-sm">Acertos: ${score}</div>
                    </div>

                    <div class="min-h-[160px] flex items-center justify-center bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200 p-8 mb-10 transition-all">
                        <p id="activity-text" class="text-2xl font-bold text-slate-800 leading-tight"></p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <button onclick="checkAnswer('VA')" class="game-btn bg-emerald-500 hover:bg-emerald-600 text-white p-5 rounded-2xl font-bold shadow-lg shadow-emerald-100">VA (Valor Agregado)</button>
                        <button onclick="checkAnswer('NNVA')" class="game-btn bg-amber-500 hover:bg-amber-600 text-white p-5 rounded-2xl font-bold shadow-lg shadow-amber-100">NNVA (Obrigatório)</button>
                        <button onclick="checkAnswer('NVA')" class="game-btn bg-red-500 hover:bg-red-600 text-white p-5 rounded-2xl font-bold shadow-lg shadow-red-100">NVA (Desperdício)</button>
                    </div>
                    <div id="game-feedback" class="mt-8 text-sm font-bold h-6 flex items-center justify-center"></div>
                </div>
            `;
            initLabActivity();
        }

        function initLabActivity() {
            const txt = document.getElementById('activity-text');
            if (!txt) return;
            if (currentActivityIndex < activities.length) {
                txt.innerText = activities[currentActivityIndex].t;
            } else {
                txt.innerHTML = "<div class='text-center animate-bounce'><span class='text-sky-600 text-3xl block mb-2'>🏆</span><span class='text-sky-800'>Laboratório Concluído com Sucesso!</span></div><br><button onclick='resetLab()' class='text-[10px] uppercase text-slate-400 underline tracking-widest hover:text-sky-600'>Recomeçar</button>";
            }
        }

        function checkAnswer(ans) {
            if (currentActivityIndex >= activities.length) return;
            const fb = document.getElementById('game-feedback');
            if (!fb) return;

            if (ans === activities[currentActivityIndex].type) {
                score++;
                fb.innerText = "Correto! " + activities[currentActivityIndex].hint;
                fb.className = "mt-8 text-sm font-bold text-emerald-600 animate-fade";
                document.getElementById('game-score').innerText = "Acertos: " + score;
                setTimeout(() => {
                    currentActivityIndex++;
                    fb.innerText = "";
                    initLabActivity();
                }, 2000);
            } else {
                fb.innerText = "Tente novamente. Isso agrega valor direto ao produto final ou é apenas uma exigência administrativa/espera?";
                fb.className = "mt-8 text-sm font-bold text-red-500 animate-pulse";
            }
        }

        function resetLab() {
            score = 0; currentActivityIndex = 0; nav('lab');
        }

        function renderMetrics(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-2xl font-bold text-slate-900">Simulador de Métricas e Eficiência (PCE)</h2>
                    <p class="text-slate-500">Cálculo real de Lead Time em processos de saneamento.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-10">
                    <div class="lg:col-span-4 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col">
                        <h3 class="font-bold text-slate-800 mb-6 text-sm uppercase flex items-center gap-2"><span>🧮</span> Calculadora</h3>
                        <div class="space-y-6 flex-1">
                            <div>
                                <label class="text-[10px] font-bold text-emerald-600 uppercase mb-2 block">Tempo de Processamento (VA)</label>
                                <div class="flex items-center gap-2">
                                    <input type="number" id="m-va" value="120" oninput="updateMetrics()" class="flex-1 p-4 bg-emerald-50 border-2 border-emerald-100 rounded-2xl font-bold text-emerald-700 focus:outline-none focus:border-emerald-400">
                                    <span class="text-xs font-bold text-slate-400">min</span>
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-red-600 uppercase mb-2 block">Tempo de Espera/Fila (NVA)</label>
                                <div class="flex items-center gap-2">
                                    <input type="number" id="m-nva" value="2880" oninput="updateMetrics()" class="flex-1 p-4 bg-red-50 border-2 border-red-100 rounded-2xl font-bold text-red-700 focus:outline-none focus:border-red-400">
                                    <span class="text-xs font-bold text-slate-400">min</span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                            <div class="text-[10px] text-slate-400 font-bold uppercase mb-2">PCE (Eficiência do Ciclo)</div>
                            <div id="pce-val" class="text-5xl font-black text-blue-600">0%</div>
                        </div>
                    </div>
                    
                    <div class="lg:col-span-8 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 h-full">
                            <div class="flex flex-col items-center">
                                <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-6 tracking-widest">Composição do Tempo</h4>
                                <div class="chart-container"><canvas id="metricsChart"></canvas></div>
                            </div>
                            <div class="flex flex-col items-center justify-center">
                                <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-6 tracking-widest">Termômetro de Eficiência</h4>
                                <div class="w-full max-w-[200px] h-48 relative">
                                    <canvas id="gaugeChart"></canvas>
                                    <div class="absolute inset-0 flex items-center justify-center font-black text-slate-900 text-2xl" id="gauge-text" style="padding-top: 30px">0%</div>
                                </div>
                                <p id="metrics-advice" class="text-[10px] mt-4 font-bold text-center px-4 uppercase leading-tight"></p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-amber-50 p-6 rounded-[2rem] border-l-8 border-amber-400 text-sm text-amber-800 italic">
                    <strong>Nota MBA:</strong> Em processos de infraestrutura, um PCE acima de 25% é considerado excelente. No saneamento, onde o capital é intensivo, cada 1% de aumento no PCE economiza milhões em custo operacional.
                </div>
            `;
            setTimeout(initMetricsCharts, 100);
        }

        function updateMetrics() {
            const vaInput = document.getElementById('m-va');
            const nvaInput = document.getElementById('m-nva');
            const pceDisplay = document.getElementById('pce-val');
            const gaugeText = document.getElementById('gauge-text');
            const advice = document.getElementById('metrics-advice');

            if (!vaInput || !nvaInput) return;

            const va = parseFloat(vaInput.value) || 0;
            const nva = parseFloat(nvaInput.value) || 0;
            const lt = va + nva;
            const pce = lt > 0 ? (va / lt) * 100 : 0;

            if (pceDisplay) pceDisplay.innerText = pce.toFixed(2) + '%';
            if (gaugeText) gaugeText.innerText = pce.toFixed(1) + '%';
            
            if (advice) {
                if (pce < 5) {
                    advice.innerText = "Estado Crítico: Foco urgente na redução de esperas.";
                    advice.className = "text-[10px] mt-4 font-bold text-center px-4 uppercase text-red-500";
                } else if (pce < 25) {
                    advice.innerText = "Bom começo, mas há muito desperdício invisível.";
                    advice.className = "text-[10px] mt-4 font-bold text-center px-4 uppercase text-amber-600";
                } else {
                    advice.innerText = "Eficiência de Classe Mundial no Saneamento.";
                    advice.className = "text-[10px] mt-4 font-bold text-center px-4 uppercase text-emerald-600";
                }
            }

            if (charts.metrics) {
                charts.metrics.data.datasets[0].data = [va, nva];
                charts.metrics.update();
            }
            if (charts.gauge) {
                charts.gauge.data.datasets[0].data = [pce, 100 - pce];
                let color = pce < 5 ? '#ef4444' : (pce < 25 ? '#eab308' : '#22c55e');
                charts.gauge.data.datasets[0].backgroundColor = [color, '#f1f5f9'];
                charts.gauge.update();
            }
        }

        function initMetricsCharts() {
            const ctx1 = document.getElementById('metricsChart'); if(!ctx1) return;
            charts.metrics = new Chart(ctx1.getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['VA', 'NVA'], datasets: [{ data: [120, 2880], backgroundColor: ['#10b981', '#f87171'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            const ctx2 = document.getElementById('gaugeChart'); if(!ctx2) return;
            charts.gauge = new Chart(ctx2.getContext('2d'), {
                type: 'doughnut',
                data: { datasets: [{ data: [4, 96], backgroundColor: ['#0284c7', '#f1f5f9'], borderWidth: 0 }] },
                options: { cutout: '80%', circumference: 180, rotation: 270, responsive: true, maintainAspectRatio: false, plugins: { tooltip: { enabled: false } } }
            });
            updateMetrics();
        }

        function renderVSM(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-2xl font-bold text-slate-900">Construindo o VSM</h2>
                    <p class="text-slate-500">Mapeamento do Fluxo de Valor Passo a Passo.</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-8 rounded-[2rem] border shadow-sm transition-transform hover:-translate-y-1">
                        <div class="flex items-center gap-4 mb-4">
                            <span class="bg-sky-600 text-white w-10 h-10 rounded-xl flex items-center justify-center font-bold shadow-lg shadow-sky-100">1</span>

                                    </ul>

                                <input type="range" id="f-v" value="6" min="1" max="10" oninput="upDVF()" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer">

            setTimeout(upDVF, 150);
        }

        function upDVF() {
            const dEl = document.getElementById('d-v');
            const vEl = document.getElementById('v-v');
            const fEl = document.getElementById('f-v');
            const ctx = document.getElementById('dvfChart');
            
            if(!dEl || !vEl || !fEl || !ctx) return;

            const d = dEl.value;
            const v = vEl.value;
            const f = fEl.value;

            document.getElementById('d-val').innerText = d;
            document.getElementById('v-val').innerText = v;
            document.getElementById('p-val').innerText = f;

            if (charts.dvf) charts.dvf.destroy();
            charts.dvf = new Chart(ctx.getContext('2d'), {
                type: 'radar',
                data: { labels: ['Desejabilidade','Viabilidade','Praticidade'], datasets: [{ label: 'Score do Experimento', data: [d, v, f], backgroundColor: 'rgba(2, 132, 199, 0.2)', borderColor: '#0284c7', borderWidth: 2, pointBackgroundColor: '#0284c7' }] },
                options: { scales: { r: { min: 0, max: 10, ticks: { display: false } } }, plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
            });
        }

        window.onload = () => nav('intro');
