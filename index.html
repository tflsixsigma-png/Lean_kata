<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA Projetos COPASA - Prof. Thiago Lima - Gestão Lean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f0f9ff; color: #1e293b; }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #0284c7; border-radius: 10px; }

        /* Kata Card Flip Animation */
        .perspective-1500 { perspective: 1500px; }
        .kata-card-inner {
            position: relative;
            width: 100%;
            height: 620px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .kata-card-flipped { transform: rotateY(180deg); }
        .kata-front, .kata-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        .kata-front {
            background: linear-gradient(145deg, #1e3a8a, #1e40af);
            color: white;
            border: 4px solid #1d4ed8;
            padding: 2rem;
        }
        .kata-back {
            background-color: white;
            color: #1e293b;
            transform: rotateY(180deg);
            border: 4px solid #e2e8f0;
            padding: 1.5rem;
        }

        .chart-container { position: relative; width: 100%; height: 280px; margin: 0 auto; }
        
        .nav-btn { transition: all 0.3s; border-left: 4px solid transparent; width: 100%; text-align: left; }
        .nav-active { background-color: #0284c7; border-left: 4px solid #0c4a6e; color: white !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        .theory-section { border-left: 4px solid #0284c7; padding-left: 1.5rem; margin-bottom: 2rem; }
        
        .game-btn { transition: all 0.2s; }
        .game-btn:active { transform: scale(0.95); }

        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th { background-color: #f8fafc; color: #475569; font-weight: 700; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.05em; padding: 1rem; border-bottom: 2px solid #e2e8f0; }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }

        /* Header Mobile Fix */
        .mobile-header { position: fixed; top: 0; left: 0; right: 0; height: 60px; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; background: white; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Header Mobile -->
    <div class="mobile-header lg:hidden">
        <span class="font-black text-sky-700">MBA COPASA</span>
        <button id="menu-toggle-btn" class="p-2 text-sky-700 text-2xl focus:outline-none">☰</button>
    </div>

    <!-- Sidebar Navigation (Desktop) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 lg:static lg:block w-72 bg-white shadow-xl z-[60] transition-transform duration-300 ease-in-out shrink-0 flex flex-col">
        <div class="p-8 border-b border-gray-100 hidden lg:block">
            <h1 class="text-2xl font-black text-sky-700 leading-tight">MBA COPASA</h1>
            <p class="text-[10px] text-gray-500 mt-1 font-bold uppercase tracking-widest">Gestão de Projetos & Lean</p>
        </div>
        
        <!-- Mobile Sidebar Close Button -->
        <div class="p-4 border-b lg:hidden flex justify-between items-center bg-sky-50">
            <span class="font-bold text-sky-800">Navegação</span>
            <button id="menu-close-btn" class="text-2xl text-sky-800">✕</button>
        </div>

        <nav class="flex-1 overflow-y-auto py-6">
            <ul class="space-y-1">
                <li><button onclick="nav('intro')" id="nav-intro" class="nav-btn px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">1. Alinhamento Estratégico</button></li>
                <li><button onclick="nav('cultura')" id="nav-cultura" class="nav-btn px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">2. Cultura & VA/NVA</button></li>
                <li><button onclick="nav('lab')" id="nav-lab" class="nav-btn px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">3. Laboratório VA/NVA</button></li>
                <li><button onclick="nav('metrics')" id="nav-metrics" class="nav-btn px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">4. Simulador de Métricas</button></li>
                <li><button onclick="nav('vsm')" id="nav-vsm" class="nav-btn px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">5. Construindo o VSM</button></li>
                <li><button onclick="nav('kata')" id="nav-kata" class="nav-btn px-8 py-3 text-sm font-semibold text-gray-600 hover:bg-sky-50">6. Toyota Kata & DVF</button></li>
            </ul>
        </nav>
        
        <div class="p-6 border-t border-gray-100 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-sky-600 flex items-center justify-center text-white font-bold text-sm">TL</div>
            <div>
                <p class="text-xs font-bold text-gray-700">Prof. Thiago Lima</p>
                <p class="text-[10px] text-gray-400">Instrutor MBA</p>
            </div>
        </div>
    </aside>

    <!-- Overlay para fechar menu no mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-[55] hidden lg:hidden"></div>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-6 md:p-12 pt-20 lg:pt-12" id="scroll-target">
        <div id="content-area" class="max-w-5xl mx-auto">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script>
        // --- State ---
        let charts = {};
        let score = 0;
        let currentActivityIndex = 0;

        const activities = [
            { t: "Consertando cano rompido no campo", type: "VA", hint: "Transforma o problema em solução para o cliente." },
            { t: "Caminhão parado no trânsito urbano", type: "NVA", hint: "O cliente não paga por trânsito; é um desperdício logístico." },
            { t: "Preenchendo relatório para Arsae-MG", type: "NNVA", hint: "Obrigatório por lei (Necessário mas s/ Valor direto)." },
            { t: "Tratamento físico-químico da água", type: "VA", hint: "Agrega valor direto: torna a água potável." },
            { t: "Aguardando assinatura para liberar obra", type: "NVA", hint: "Fila e espera; desperdício de tempo." },
            { t: "Retrabalho de recomposição de calçada", type: "NVA", hint: "Fazer de novo é desperdício de recurso." }
        ];

        // --- Mobile Menu Logic ---
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const toggleBtn = document.getElementById('menu-toggle-btn');
        const closeBtn = document.getElementById('menu-close-btn');

        function toggleMenu() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        toggleBtn.onclick = toggleMenu;
        closeBtn.onclick = toggleMenu;
        overlay.onclick = toggleMenu;

        // --- Navigation ---
        function nav(page) {
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active', 'text-white'));
            const activeBtn = document.getElementById(`nav-${page}`);
            if (activeBtn) activeBtn.classList.add('nav-active');
            
            const section = document.createElement('div');
            section.className = 'animate-fade';
            container.appendChild(section); 
            
            document.getElementById('scroll-target').scrollTop = 0;
            if (!sidebar.classList.contains('-translate-x-full')) toggleMenu(); // Fecha menu no mobile após clicar

            switch(page) {
                case 'intro': renderIntro(section); break;
                case 'cultura': renderCultura(section); break;
                case 'lab': renderLab(section); break;
                case 'metrics': renderMetrics(section); break;
                case 'vsm': renderVSM(section); break;
                case 'kata': renderKata(section); break;
            }
        }

        function renderIntro(el) {
            el.innerHTML = `
                <div class="theory-section">
                    <h2 class="text-2xl md:text-3xl font-black text-slate-900">Alinhamento Estratégico</h2>
                    <p class="text-slate-500">Missão, Visão e Valores no Contexto Lean</p>
                </div>
                
                <div class="bg-white rounded-3xl shadow-sm p-6 md:p-8 mb-8 border border-slate-100">
                    <p class="text-slate-600 mb-6 text-sm md:text-base leading-relaxed">
                        A identidade corporativa da COPASA serve como o alicerce para a implementação da cultura Lean. Quando a organização define sua missão como a prestação de serviços com excelência, ela está definindo o <strong>"Valor"</strong> que o cliente espera receber.
                    </p>
                    
                    <div class="overflow-x-auto rounded-2xl border border-slate-200">
                        <table class="min-w-[600px]">
                            <thead>
                                <tr><th>Elemento</th><th>Definição COPASA</th><th>Ótica Lean</th></tr>
                            </thead>
                            <tbody>
                                <tr><td class="font-bold text-sky-700">Missão</td><td>Prestar serviços de saneamento com ética e integridade.</td><td>Entrega de valor máximo eliminando burocracias.</td></tr>
                                <tr><td class="font-bold text-sky-700">Visão</td><td>Ser referência em soluções de saneamento em MG.</td><td>Melhoria contínua (Kaizen) para eficiência mundial.</td></tr>
                                <tr><td class="font-bold text-sky-700">Valores</td><td>Transparência, honestidade e excelência.</td><td>Respeito pelas pessoas e decisões baseadas em dados.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderCultura(el) {
            el.innerHTML = `
                <div class="theory-section"><h2 class="text-2xl font-bold">VA, NVA e NNVA</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-emerald-50 p-6 rounded-3xl border-2 border-emerald-100">
                        <div class="font-bold text-emerald-800 mb-2">VA (Valor Agregado)</div>
                        <p class="text-xs text-emerald-700 leading-tight italic">O cliente paga por isso.</p>
                    </div>
                    <div class="bg-amber-50 p-6 rounded-3xl border-2 border-amber-100">
                        <div class="font-bold text-amber-800 mb-2">NNVA (Obrigatório)</div>
                        <p class="text-xs text-amber-700 leading-tight italic">Exigências legais e segurança.</p>
                    </div>
                    <div class="bg-red-50 p-6 rounded-3xl border-2 border-red-100">
                        <div class="font-bold text-red-800 mb-2">NVA (Desperdício)</div>
                        <p class="text-xs text-red-700 leading-tight italic">Elimine imediatamente.</p>
                    </div>
                </div>
            `;
        }

        function renderLab(el) {
            el.innerHTML = `
                <div class="theory-section"><h2 class="text-2xl font-bold">Laboratório de Classificação</h2></div>
                <div class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-xl border border-slate-100 text-center">
                    <div id="game-score" class="mb-4 bg-sky-100 text-sky-700 px-4 py-1 rounded-full font-bold text-xs inline-block">Acertos: ${score}</div>
                    <div class="min-h-[140px] flex items-center justify-center bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200 p-6 mb-8">
                        <p id="activity-text" class="text-xl font-bold text-slate-800"></p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <button onclick="checkAnswer('VA')" class="game-btn bg-emerald-500 text-white p-4 rounded-2xl font-bold">VA</button>
                        <button onclick="checkAnswer('NNVA')" class="game-btn bg-amber-500 text-white p-4 rounded-2xl font-bold">NNVA</button>
                        <button onclick="checkAnswer('NVA')" class="game-btn bg-red-500 text-white p-4 rounded-2xl font-bold">NVA</button>
                    </div>
                    <div id="game-feedback" class="mt-6 text-sm font-bold h-6"></div>
                </div>
            `;
            initLabActivity();
        }

        function initLabActivity() {
            const txt = document.getElementById('activity-text');
            if (!txt) return;
            if (currentActivityIndex < activities.length) {
                txt.innerText = activities[currentActivityIndex].t;
            } else {
                txt.innerHTML = "<span class='text-sky-600'>Laboratório Concluído! 🏆</span>";
            }
        }

        function checkAnswer(ans) {
            if (currentActivityIndex >= activities.length) return;
            const fb = document.getElementById('game-feedback');
            if (ans === activities[currentActivityIndex].type) {
                score++;
                fb.innerText = "Correto! " + activities[currentActivityIndex].hint;
                fb.className = "mt-6 text-sm font-bold text-emerald-600";
                document.getElementById('game-score').innerText = "Acertos: " + score;
                setTimeout(() => { currentActivityIndex++; fb.innerText = ""; initLabActivity(); }, 1500);
            } else {
                fb.innerText = "Ops! Reflita sobre o valor para o cliente.";
                fb.className = "mt-6 text-sm font-bold text-red-500";
            }
        }

        function renderMetrics(el) {
            el.innerHTML = `
                <div class="theory-section"><h2 class="text-2xl font-bold">Simulador de Métricas</h2></div>
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <div class="lg:col-span-4 bg-white p-6 rounded-[2rem] shadow-sm border space-y-6">
                        <div>
                            <label class="text-[10px] font-bold uppercase mb-1 block">Tempo VA (Ativo)</label>
                            <input type="number" id="m-va" value="120" oninput="updateMetrics()" class="w-full p-4 bg-emerald-50 border-2 border-emerald-100 rounded-2xl font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase mb-1 block">Tempo NVA (Espera)</label>
                            <input type="number" id="m-nva" value="2880" oninput="updateMetrics()" class="w-full p-4 bg-red-50 border-2 border-red-100 rounded-2xl font-bold">
                        </div>
                        <div class="text-center pt-4 border-t"><div id="pce-val" class="text-4xl font-black text-blue-600">0%</div><span class="text-[10px] font-bold uppercase text-slate-400 tracking-widest">PCE</span></div>
                    </div>
                    <div class="lg:col-span-8 bg-white p-6 rounded-[2rem] shadow-sm border">
                        <div class="chart-container"><canvas id="metricsChart"></canvas></div>
                    </div>
                </div>
            `;
            setTimeout(initMetricsCharts, 150);
        }

        function updateMetrics() {
            const va = parseFloat(document.getElementById('m-va').value) || 0;
            const nva = parseFloat(document.getElementById('m-nva').value) || 0;
            const lt = va + nva;
            const pce = lt > 0 ? (va / lt) * 100 : 0;
            document.getElementById('pce-val').innerText = pce.toFixed(1) + '%';
            if (charts.metrics) { charts.metrics.data.datasets[0].data = [va, nva]; charts.metrics.update(); }
        }

        function initMetricsCharts() {
            const ctx = document.getElementById('metricsChart'); if(!ctx) return;
            charts.metrics = new Chart(ctx.getContext('2d'), {
                type: 'doughnut', data: { labels: ['VA','NVA'], datasets: [{ data: [120, 2880], backgroundColor: ['#10b981', '#f87171'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
            updateMetrics();
        }

        function renderVSM(el) {
            el.innerHTML = `
                <div class="theory-section"><h2 class="text-2xl font-bold">Construindo o VSM</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <div class="font-bold text-sky-700 mb-2">1. Família de Produtos</div>
                        <p class="text-xs text-slate-500">Escolha um fluxo crítico, como Ligação de Água.</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <div class="font-bold text-sky-700 mb-2">2. Estado Atual</div>
                        <p class="text-xs text-slate-500">Vá ao Gemba. Desenhe o que realmente ocorre hoje.</p>
                    </div>
                </div>
            `;
        }

        function renderKata(el) {
            el.innerHTML = `
                <div class="theory-section"><h2 class="text-2xl font-bold">Toyota Kata & DVF</h2></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                    <div class="perspective-1500" onclick="document.getElementById('ki').classList.toggle('kata-card-flipped')">
                        <div id="ki" class="kata-card-inner">
                            <div class="kata-front">
                                <h4 class="text-2xl font-black mb-6">Kata de Melhoria</h4>
                                <ul class="text-sm space-y-4 font-bold opacity-90">
                                    <li>1. Entenda a Direção</li><li>2. Condição Atual</li><li>3. Condição Alvo</li><li>4. Experimente</li>
                                </ul>
                                <p class="mt-auto text-center text-xs opacity-50 uppercase">Toque para o Verso</p>
                            </div>
                            <div class="kata-back">
                                <div class="text-[10px] font-bold text-blue-600 uppercase mb-2">Verso: Reflexão</div>
                                <div class="bg-slate-50 p-4 rounded-2xl border text-[10px]">
                                    <h5 class="font-bold mb-2">Último Passo Feito:</h5>
                                    <p>a) Planejado? b) Esperado? c) Aconteceu? d) Aprendeu?</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border h-full min-h-[300px] relative">
                        <h4 class="text-[10px] font-bold uppercase text-sky-600 mb-4 text-center">Framework DVF (Radar)</h4>
                        <div class="h-48"><canvas id="dvfChart"></canvas></div>
                        <div class="mt-6 space-y-2">
                            <input type="range" id="d-v" value="7" min="1" max="10" oninput="upDVF()" class="w-full h-1 bg-slate-100">
                        </div>
                    </div>
                </div>
            `;
            setTimeout(upDVF, 200);
        }

        function upDVF() {
            const ctx = document.getElementById('dvfChart'); if(!ctx) return;
            if (charts.dvf) charts.dvf.destroy();
            charts.dvf = new Chart(ctx.getContext('2d'), {
                type: 'radar', data: { labels: ['D','V','F'], datasets: [{ data: [7, 6, 8], backgroundColor: 'rgba(2, 132, 199, 0.2)', borderColor: '#0284c7' }] },
                options: { scales: { r: { min: 0, max: 10, ticks: { display: false } } }, responsive: true, maintainAspectRatio: false }
            });
        }

        window.onload = () => nav('intro');
    </script>
</body>
</html>
