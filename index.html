<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA Projetos COPASA - Prof. Thiago Lima - Gestão Lean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .chart-container { position: relative; width: 100%; max-width: 700px; height: 350px; margin: 0 auto; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 1); }
        .nav-active { background-color: #1e3a8a; color: white; border-right: 4px solid #3b82f6; }
        .theory-block { border-left: 4px solid #3b82f6; padding-left: 1.5rem; margin-bottom: 2rem; }
        
        /* Kata Card Flip Effect */
        .kata-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
            height: 450px;
        }
        .kata-card-flipped { transform: rotateY(180deg); }
        .kata-front, .kata-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .kata-back { transform: rotateY(180deg); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
    </style>
    <!-- Chosen Palette: "Blue Horizon" - Tons de azul profundo (COPASA), azul claro (água) e cinzas profissionais. -->
    <!-- Application Structure Plan: 
         - A ementa foi transformada em uma barra de navegação lógica para o MBA.
         - NOVO ITEM: "Kata & Experimentos" focado na rotina de melhoria contínua e validação de ideias (DVF).
         - O Cartão Toyota Kata foi desenhado para ser interativo (flip) para simular o uso físico do cartão de coaching.
         - O Framework DVF utiliza um gráfico de radar para visualização de equilíbrio entre as três dimensões.
    -->
    <!-- Visualization & Content Choices:
         - VSM: Simulador de PCE (Process Cycle Efficiency).
         - Toyota Kata: Cartão Frente/Verso interativo via CSS Flip.
         - DVF: Radar Chart (Chart.js) para análise de viabilidade de projetos.
         - CONFIRMATION: NO SVG graphics used. NO Mermaid JS used.
    -->
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR NAV -->
    <aside class="w-72 bg-slate-900 text-slate-300 hidden md:flex flex-col shadow-2xl shrink-0">
        <div class="p-6 bg-blue-900">
            <div class="text-[10px] font-bold text-blue-300 uppercase tracking-tighter">MBA Gestão de Projetos</div>
            <h1 class="text-white text-xl font-black">Prof. Thiago Lima</h1>
            <p class="text-[10px] mt-1 text-blue-200">Disciplina: Metodologia Lean</p>
        </div>
        
        <nav class="flex-1 py-6 overflow-y-auto custom-scroll">
            <div class="px-6 mb-2 text-[10px] font-bold text-slate-500 uppercase">Módulos de Estudo</div>
            <ul class="space-y-1">
                <li><button onclick="changeTab('intro')" id="nav-intro" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🏠 Início & Contexto</button></li>
                <li><button onclick="changeTab('cultura')" id="nav-cultura" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🧠 Cultura & Princípios</button></li>
                <li><button onclick="changeTab('vsm')" id="nav-vsm" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🗺️ VSM: Fluxo de Valor</button></li>
                <li><button onclick="changeTab('causa')" id="nav-causa" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🔍 Root Cause Analysis</button></li>
                <li><button onclick="changeTab('ferramentas')" id="nav-ferramentas" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🛠️ Ferramentas Lean</button></li>
                <li><button onclick="changeTab('kata')" id="nav-kata" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🔄 Kata & Experimentos</button></li>
                <li><button onclick="changeTab('projetos')" id="nav-projetos" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">📊 Lean em Projetos</button></li>
            </ul>
        </nav>
        
        <div class="p-6 bg-slate-950 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white text-xs">TL</div>
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase">Parceria</p>
                <p class="text-xs text-slate-100">COPASA / MBA Projetos</p>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto" id="scroll-top">
        <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 flex justify-between items-center">
            <div class="flex items-center gap-3 md:hidden">
                <span class="text-blue-900 font-bold">MBA Prof. Thiago</span>
            </div>
            <div class="text-xs font-medium text-slate-500 hidden md:block">Apostila Interativa v3.0 • Toyota Kata e Framework DVF</div>
            <div class="flex gap-4">
                <span class="text-xs font-bold text-blue-700 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">Cultura da Melhoria</span>
            </div>
        </header>

        <div id="content-area" class="p-4 md:p-10 max-w-6xl mx-auto">
            <!-- Content injected by JS -->
        </div>
    </main>

    <script>
        let currentTab = 'intro';
        let charts = {};

        const wastes = [
            { i: "🚚", t: "Transporte", d: "Movimentação desnecessária de materiais entre bases da COPASA." },
            { i: "📦", t: "Estoque", d: "Excesso de insumos parados no almoxarifado regional." },
            { i: "🚶", t: "Movimento", d: "Deslocamento ineficiente de técnicos no local da obra." },
            { i: "⏳", t: "Espera", d: "Equipe aguardando liberação de projeto ou material." },
            { i: "🏭", t: "Superprodução", d: "Executar mais metros de rede do que o planejado para o dia." },
            { i: "🔬", t: "Superprocessamento", d: "Burocracia excessiva em aprovações de baixa complexidade." },
            { i: "❌", t: "Defeitos", d: "Retrabalho por falha na execução ou material de baixa qualidade." },
            { i: "🧠", t: "Intelecto", d: "Ignorar sugestões de quem está na ponta operacional." }
        ];

        function changeTab(tab) {
            currentTab = tab;
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            const activeNav = document.getElementById(`nav-${tab}`);
            if (activeNav) activeNav.classList.add('nav-active');

            const section = document.createElement('div');
            section.className = 'animate-slide';

            switch(tab) {
                case 'intro': renderIntro(section); break;
                case 'cultura': renderCultura(section); break;
                case 'vsm': renderVSM(section); break;
                case 'causa': renderCausa(section); break;
                case 'ferramentas': renderFerramentas(section); break;
                case 'kata': renderKata(section); break;
                case 'projetos': renderProjetos(section); break;
            }
            container.appendChild(section);
            document.getElementById('scroll-top').scrollTop = 0;
        }

        function renderIntro(el) {
            el.innerHTML = `
                <div class="mb-10">
                    <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Lean: Foco no Valor, Eliminação do Desperdício</h2>
                    <p class="text-xl text-slate-600 leading-relaxed">Bem-vindos à disciplina do MBA de Projetos COPASA. O pensamento Lean não é apenas um conjunto de ferramentas, mas uma mudança cultural focada em entregar o que o cliente realmente precisa.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-blue-900 p-8 rounded-[40px] text-white shadow-xl">
                        <h3 class="text-2xl font-bold mb-4">Visão COPASA</h3>
                        <p class="opacity-80 leading-relaxed">O valor para a COPASA está na continuidade do abastecimento e na qualidade da água. Qualquer atividade que interrompa ou encareça esse fluxo sem agregar benefício direto é Desperdício.</p>
                    </div>
                    <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 flex items-center justify-center">
                        <div class="text-center">
                            <div class="text-5xl font-black text-blue-600 mb-2">1%</div>
                            <p class="text-slate-500 font-medium italic">"Melhor hoje do que ontem, melhor amanhã do que hoje."</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCultura(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Os 8 Desperdícios (Muda)</h2>
                    <p class="text-slate-600">No contexto de saneamento, identificar desperdícios é a chave para a sustentabilidade operacional.</p>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                    ${wastes.map(w => `
                        <div class="glass-card p-5 rounded-3xl border hover:shadow-lg transition-all group">
                            <div class="text-3xl mb-3">${w.i}</div>
                            <h4 class="font-bold text-slate-900 mb-1">${w.t}</h4>
                            <p class="text-[10px] text-slate-500">${w.d}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderVSM(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Mapeamento do Fluxo de Valor (VSM)</h2>
                    <p class="text-slate-600">Ferramenta para visualizar o fluxo de materiais e informações, distinguindo valor agregado de desperdício.</p>
                </div>
                <div class="bg-white p-8 rounded-[30px] shadow-sm border mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400">Tempo de Valor Agregado (min)</label>
                                <input type="number" id="va-time" value="40" oninput="updateVSM()" class="w-full p-3 bg-emerald-50 border-emerald-100 border rounded-2xl text-lg font-bold text-emerald-700">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400">Tempo de Espera / Lead Time (min)</label>
                                <input type="number" id="lt-time" value="200" oninput="updateVSM()" class="w-full p-3 bg-amber-50 border-amber-100 border rounded-2xl text-lg font-bold text-amber-700">
                            </div>
                        </div>
                        <div class="flex flex-col justify-center items-center bg-slate-50 rounded-3xl p-6">
                            <div class="text-[10px] font-bold text-slate-500 uppercase">Eficiência (PCE)</div>
                            <div id="pce-score" class="text-6xl font-black text-blue-600">20%</div>
                        </div>
                    </div>
                    <div class="chart-container"><canvas id="vsmChart"></canvas></div>
                </div>
            `;
            setTimeout(updateVSM, 100);
        }

        function updateVSM() {
            const va = parseFloat(document.getElementById('va-time').value) || 0;
            const lt = parseFloat(document.getElementById('lt-time').value) || 0;
            const pce = lt > 0 ? (va / lt) * 100 : 0;
            document.getElementById('pce-score').innerText = pce.toFixed(1) + '%';
            
            const ctx = document.getElementById('vsmChart').getContext('2d');
            if (charts.vsm) charts.vsm.destroy();
            charts.vsm = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Processo'],
                    datasets: [
                        { label: 'Valor Agregado', data: [va], backgroundColor: '#10b981' },
                        { label: 'Desperdício/Espera', data: [lt - va], backgroundColor: '#f59e0b' }
                    ]
                },
                options: { 
                    indexAxis: 'y', 
                    scales: { x: { stacked: true, beginAtZero: true }, y: { stacked: true } },
                    responsive: true, maintainAspectRatio: false 
                }
            });
        }

        function renderCausa(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Análise de Causa Raiz</h2>
                    <p class="text-slate-600">Não trate sintomas, ataque a causa fundamental.</p>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[30px] shadow-sm border">
                        <h4 class="font-bold text-slate-800 mb-4">Gráfico de Pareto</h4>
                        <div class="chart-container"><canvas id="paretoChart"></canvas></div>
                    </div>
                    <div class="bg-slate-900 text-white p-8 rounded-[30px] shadow-xl">
                        <h4 class="font-bold mb-4">Os 5 Porquês</h4>
                        <div class="space-y-4">
                            <div class="p-3 bg-white/10 rounded-xl border border-white/10">1. Por que parou? Falta de pressão.</div>
                            <div class="p-3 bg-white/10 rounded-xl border border-white/10">2. Por que falta pressão? Bomba falhou.</div>
                            <div class="p-3 bg-white/10 rounded-xl border border-white/10">3. Por que falhou? Rolamento quebrou.</div>
                            <div class="p-3 bg-white/10 rounded-xl border border-white/10">4. Por que quebrou? Falta de lubrificação.</div>
                            <div class="p-3 bg-blue-600 rounded-xl font-bold">5. Por que faltou? Plano de preventiva não executado.</div>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(() => {
                const ctx = document.getElementById('paretoChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Rede Antiga', 'Pressão Alta', 'Execução Ruim', 'Clima', 'Outros'],
                        datasets: [{ label: 'Qtd Vazamentos', data: [120, 45, 20, 10, 5], backgroundColor: '#3b82f6' }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }, 100);
        }

        function renderFerramentas(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Caixa de Ferramentas Lean</h2>
                    <p class="text-slate-600">Aplique o método certo para o problema certo.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <div class="text-blue-600 font-bold text-xl mb-2">5S</div>
                        <p class="text-sm text-slate-500">Organização, Limpeza e Padronização. A base da estabilidade.</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <div class="text-blue-600 font-bold text-xl mb-2">Kanban</div>
                        <p class="text-sm text-slate-500">Gestão visual do fluxo. Puxe o trabalho conforme a demanda.</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm">
                        <div class="text-blue-600 font-bold text-xl mb-2">Poka-Yoke</div>
                        <p class="text-sm text-slate-500">Dispositivos à prova de erro. Impeça a falha na fonte.</p>
                    </div>
                </div>
            `;
        }

        function renderKata(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Toyota Kata & Experimentos DVF</h2>
                    <p class="text-slate-600">Desenvolva a rotina de melhoria contínua através do Coaching Kata e valide suas ideias com o framework DVF.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-12">
                    <!-- Kata Card Flip -->
                    <div>
                        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <span>🪪</span> Cartão de Coaching Kata (Frente/Verso)
                        </h3>
                        <div class="perspective-1000" onclick="document.getElementById('kata-inner').classList.toggle('kata-card-flipped')">
                            <div id="kata-inner" class="kata-card-inner">
                                <!-- Front -->
                                <div class="kata-front bg-blue-900 text-white p-8 rounded-[40px] shadow-2xl border-4 border-blue-700 flex flex-col justify-between">
                                    <div>
                                        <div class="text-blue-300 font-black text-xs uppercase tracking-widest mb-2">Frente: O Processo</div>
                                        <h4 class="text-2xl font-bold mb-6 italic">O Kata de Melhoria</h4>
                                        <ol class="space-y-4 text-sm font-medium">
                                            <li class="flex items-start gap-3"><span class="bg-white/20 px-2 rounded">1</span> Entenda a Direção ou Desafio</li>
                                            <li class="flex items-start gap-3"><span class="bg-white/20 px-2 rounded">2</span> Entenda a Condição Atual</li>
                                            <li class="flex items-start gap-3"><span class="bg-white/20 px-2 rounded">3</span> Estabeleça a Próxima Condição Alvo</li>
                                            <li class="flex items-start gap-3"><span class="bg-white/20 px-2 rounded">4</span> Experimente em direção ao Alvo</li>
                                        </ol>
                                    </div>
                                    <div class="text-center text-[10px] opacity-60 font-bold uppercase tracking-tighter">Clique para ver as perguntas (Verso)</div>
                                </div>
                                <!-- Back -->
                                <div class="kata-back bg-white text-slate-900 p-8 rounded-[40px] shadow-2xl border-4 border-slate-200 flex flex-col justify-between">
                                    <div>
                                        <div class="text-blue-600 font-black text-xs uppercase tracking-widest mb-2">Verso: Coaching</div>
                                        <h4 class="text-xl font-bold mb-4">As 5 Perguntas do Coach</h4>
                                        <ul class="space-y-3 text-xs leading-relaxed">
                                            <li class="border-b pb-2"><strong>1.</strong> Qual é a Condição Alvo?</li>
                                            <li class="border-b pb-2"><strong>2.</strong> Qual a Condição Atual agora?</li>
                                            <li class="border-b pb-2"><strong>3.</strong> Quais obstáculos impedem você de alcançar o alvo? Qual você está atacando agora?</li>
                                            <li class="border-b pb-2"><strong>4.</strong> Qual o seu Próximo Passo?</li>
                                            <li class="border-b pb-2"><strong>5.</strong> Quando poderemos ver o que aprendemos com esse passo?</li>
                                        </ul>
                                    </div>
                                    <div class="text-center text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Clique para voltar ao processo</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- DVF Framework -->
                    <div class="flex flex-col">
                        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <span>⚖️</span> Framework DVF para Experimentos
                        </h3>
                        <div class="bg-white p-6 rounded-[40px] border shadow-sm flex-1 flex flex-col">
                            <p class="text-[10px] text-slate-500 mb-6 leading-tight">Avalie a proposta de melhoria ou projeto inovador da COPASA antes de escalar o investimento.</p>
                            
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-blue-600 uppercase">Desejabilidade</label>
                                    <input type="range" id="val-d" min="1" max="10" value="8" oninput="updateDVF()" class="w-full">
                                    <p class="text-[9px] text-slate-400 leading-tight">O cliente/sociedade quer ou precisa disso?</p>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-emerald-600 uppercase">Viabilidade</label>
                                    <input type="range" id="val-v" min="1" max="10" value="7" oninput="updateDVF()" class="w-full">
                                    <p class="text-[9px] text-slate-400 leading-tight">É financeiramente sustentável para a COPASA?</p>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-amber-600 uppercase">Praticidade (Feasibility)</label>
                                    <input type="range" id="val-f" min="1" max="10" value="6" oninput="updateDVF()" class="w-full">
                                    <p class="text-[9px] text-slate-400 leading-tight">Temos tecnologia/operação para executar?</p>
                                </div>
                            </div>

                            <div class="relative h-48 md:h-64">
                                <canvas id="dvfChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-blue-50 border border-blue-200 p-8 rounded-[40px]">
                    <h4 class="font-bold text-blue-900 mb-3">Como aplicar na COPASA:</h4>
                    <p class="text-sm text-blue-800 leading-relaxed">Imagine um novo projeto de <strong>"Leitura Remota de Hidrômetros"</strong>. Antes de comprar mil unidades, use o DVF: A população aceita o novo modelo? (D). O custo se paga com a redução de leituristas? (V). Nossa rede de rádio suporta a transmissão de dados? (F). Se os três estiverem equilibrados, o Kata entra para gerenciar os experimentos de implantação piloto.</p>
                </div>
            `;
            setTimeout(updateDVF, 100);
        }

        function updateDVF() {
            const d = parseInt(document.getElementById('val-d').value);
            const v = parseInt(document.getElementById('val-v').value);
            const f = parseInt(document.getElementById('val-f').value);

            const ctx = document.getElementById('dvfChart').getContext('2d');
            if (charts.dvf) charts.dvf.destroy();
            charts.dvf = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Desejabilidade', 'Viabilidade', 'Praticidade'],
                    datasets: [{
                        label: 'Pontuação do Experimento',
                        data: [d, v, f],
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderColor: '#3b82f6',
                        pointBackgroundColor: '#3b82f6',
                        borderWidth: 2
                    }]
                },
                options: {
                    scales: { r: { min: 0, max: 10, ticks: { display: false } } },
                    plugins: { legend: { display: false } },
                    responsive: true, maintainAspectRatio: false
                }
            });
        }

        function renderProjetos(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Lean em Projetos Complexos</h2>
                    <p class="text-slate-600">Aplicação da mentalidade enxuta em grandes obras de saneamento.</p>
                </div>
                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100 flex flex-col md:flex-row gap-8 items-center">
                    <div class="flex-1">
                        <h3 class="text-xl font-bold mb-4">Ganhos com Lean Construction</h3>
                        <ul class="space-y-4">
                            <li class="flex items-center gap-3">
