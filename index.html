<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA Projetos COPASA - Prof. Thiago Lima - Gestão Lean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; scroll-behavior: smooth; }
        .chart-container { position: relative; width: 100%; max-width: 700px; height: 350px; margin: 0 auto; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 1); }
        .nav-active { background-color: #1e3a8a; color: white; border-right: 4px solid #3b82f6; }
        .theory-block { border-left: 4px solid #3b82f6; padding-left: 1.5rem; margin-bottom: 2rem; }
        .step-node { min-width: 140px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
    </style>
    <!-- Chosen Palette: "Blue Horizon" - Tons de azul profundo (COPASA), azul claro (água) e cinzas profissionais. -->
    <!-- Application Structure Plan: 
         - A ementa foi transformada em uma barra de navegação lógica: Fundamentos, Mapeamento, Solução, Ferramentas e Projetos.
         - Cada seção contém: 1. Teoria Detalhada; 2. Exemplo no contexto COPASA; 3. Ferramenta Interativa.
         - Por que esta estrutura: O aluno de MBA precisa do rigor acadêmico (teoria) junto com a aplicação imediata (interatividade).
    -->
    <!-- Visualization & Content Choices:
         - Cultura: Grid de Desperdícios interativo para fixação conceitual.
         - VSM: Simulador de PCE (Process Cycle Efficiency) com entradas dinâmicas e gráfico de barras VA vs NVA.
         - Root Cause: Ishikawa Diagram (HTML/CSS) e Gráfico de Pareto (Chart.js).
         - Projetos: Dashboards comparativos de Lead Time.
         - CONFIRMATION: NO SVG graphics used. NO Mermaid JS used.
    -->
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR NAV -->
    <aside class="w-72 bg-slate-900 text-slate-300 hidden md:flex flex-col shadow-2xl">
        <div class="p-6 bg-blue-900">
            <div class="text-[10px] font-bold text-blue-300 uppercase tracking-tighter">MBA Gestão de Projetos</div>
            <h1 class="text-white text-xl font-black">Prof. Thiago Lima</h1>
            <p class="text-[10px] mt-1 text-blue-200">Disciplina: Metodologia Lean</p>
        </div>
        
        <nav class="flex-1 py-6 overflow-y-auto custom-scroll">
            <div class="px-6 mb-2 text-[10px] font-bold text-slate-500 uppercase">Módulos de Estudo</div>
            <ul class="space-y-1">
                <li><button onclick="changeTab('intro')" id="nav-intro" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🏠 Início & Contexto</button></li>
                <li><button onclick="changeTab('cultura')" id="nav-cultura" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🧠 Cultura & Princípios</button></li>
                <li><button onclick="changeTab('vsm')" id="nav-vsm" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🗺️ VSM: Fluxo de Valor</button></li>
                <li><button onclick="changeTab('causa')" id="nav-causa" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🔍 Root Cause Analysis</button></li>
                <li><button onclick="changeTab('ferramentas')" id="nav-ferramentas" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">🛠️ Ferramentas Lean</button></li>
                <li><button onclick="changeTab('projetos')" id="nav-projetos" class="nav-btn w-full text-left px-6 py-3 transition-all hover:bg-slate-800 flex items-center gap-3">📊 Lean em Projetos</button></li>
            </ul>
        </nav>
        
        <div class="p-6 bg-slate-950 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white text-xs">TL</div>
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase">Parceria</p>
                <p class="text-xs text-slate-100">COPASA / MBA Projetos</p>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto" id="scroll-top">
        <!-- Top Bar -->
        <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-slate-200 p-4 flex justify-between items-center">
            <div class="flex items-center gap-3 md:hidden">
                <span class="text-blue-900 font-bold">MBA Prof. Thiago</span>
            </div>
            <div class="text-xs font-medium text-slate-500 hidden md:block">Apostila Interativa v2.1 • Lean na Gestão de Saneamento</div>
            <div class="flex gap-4">
                <span class="text-xs font-bold text-blue-700 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">Cultura da Eficiência</span>
            </div>
        </header>

        <div id="content-area" class="p-4 md:p-10 max-w-6xl mx-auto">
            <!-- Content injected by JS -->
        </div>
    </main>

    <script>
        // --- State Management ---
        let currentTab = 'intro';
        let charts = {};

        // --- Data Mockups ---
        const theoryData = {
            intro: {
                title: "Lean: Filosofia Além das Ferramentas",
                intro: "O Lean surgiu no Sistema Toyota de Produção e foca na eliminação sistemática de desperdícios para gerar o máximo valor ao cliente.",
                contexto: "Na COPASA, o 'cliente' é a população mineira. Valor significa: Água tratada com qualidade, continuidade no abastecimento e modicidade tarifária."
            },
            cultura: {
                principios: [
                    { t: "Valor", d: "Definido pela necessidade do cliente final." },
                    { t: "Fluxo de Valor", d: "Mapeamento de todas as etapas do processo." },
                    { t: "Fluxo Contínuo", d: "Fazer o trabalho fluir sem interrupções." },
                    { t: "Produção Puxada", d: "Só produzir o que foi demandado." },
                    { t: "Perfeição", d: "Melhoria contínua (Kaizen)." }
                ],
                desperdicios: [
                    { i: "🚚", t: "Transporte", d: "Movimentação desnecessária de materiais/ferramentas entre bases da COPASA." },
                    { i: "📦", t: "Estoque", d: "Hidrômetros e conexões parados no almoxarifado gerando custo de capital." },
                    { i: "🚶", t: "Movimento", d: "Técnicos de campo andando excessivamente para pegar peças no caminhão mal organizado." },
                    { i: "⏳", t: "Espera", d: "Equipe parada aguardando a liberação asfáltica da prefeitura." },
                    { i: "🏭", t: "Superprodução", d: "Gerar relatórios de medição que não são utilizados pela gestão." },
                    { i: "🔬", t: "Superprocessamento", d: "Etapas de aprovação burocrática redundantes para pequenos reparos." },
                    { i: "❌", t: "Defeitos", d: "Vazamento recorrente em rede recém-implantada (retrabalho)." },
                    { i: "🧠", t: "Conhecimento", d: "Não ouvir as sugestões de melhoria dos operadores de ETE/ETA." }
                ]
            }
        };

        // --- Core Navigation ---
        function changeTab(tab) {
            currentTab = tab;
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            
            // Clean active states
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            const activeNav = document.getElementById(`nav-${tab}`);
            if (activeNav) activeNav.classList.add('nav-active');

            const section = document.createElement('div');
            section.className = 'animate-slide';

            switch(tab) {
                case 'intro': renderIntro(section); break;
                case 'cultura': renderCultura(section); break;
                case 'vsm': renderVSM(section); break;
                case 'causa': renderCausa(section); break;
                case 'ferramentas': renderFerramentas(section); break;
                case 'projetos': renderProjetos(section); break;
            }
            container.appendChild(section);
            document.getElementById('scroll-top').scrollTop = 0;
        }

        // --- Render Modules ---

        function renderIntro(el) {
            el.innerHTML = `
                <div class="mb-10">
                    <h2 class="text-4xl font-extrabold text-slate-900 mb-4">${theoryData.intro.title}</h2>
                    <p class="text-xl text-slate-600 leading-relaxed">${theoryData.intro.intro}</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    <div class="glass-card p-6 rounded-3xl border-l-4 border-blue-600 shadow-sm">
                        <div class="text-blue-600 font-bold mb-2">Mentalidade Lean</div>
                        <p class="text-sm text-slate-600 italic">"Não é sobre reduzir pessoas, é sobre reduzir o tempo entre o pedido e a entrega (Lead Time)."</p>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-l-4 border-emerald-500 shadow-sm">
                        <div class="text-emerald-600 font-bold mb-2">Visão Prof. Thiago</div>
                        <p class="text-sm text-slate-600">Nosso foco no MBA é aplicar esses conceitos na infraestrutura pesada da COPASA.</p>
                    </div>
                    <div class="glass-card p-6 rounded-3xl border-l-4 border-amber-500 shadow-sm">
                        <div class="text-amber-600 font-bold mb-2">O Foco</div>
                        <p class="text-sm text-slate-600">Eliminar o que o cliente não está disposto a pagar: o desperdício.</p>
                    </div>
                </div>

                <div class="bg-blue-900 p-8 rounded-[40px] text-white flex flex-col md:flex-row items-center gap-8 shadow-xl">
                    <div class="flex-1">
                        <h3 class="text-2xl font-bold mb-4">Contexto Saneamento (Minas Gerais)</h3>
                        <p class="opacity-80 leading-relaxed">A COPASA gerencia milhares de quilômetros de rede. Um ganho de 5% de eficiência no reparo de vazamentos representa milhões de reais que podem ser reinvestidos na universalização do esgoto.</p>
                    </div>
                    <div class="flex-shrink-0 bg-white/10 p-4 rounded-3xl border border-white/20">
                        <div class="text-center">
                            <div class="text-3xl font-black">24/7</div>
                            <div class="text-[10px] uppercase font-bold tracking-widest">Disponibilidade</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCultura(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Os 5 Princípios Lean</h2>
                    <p class="text-slate-600">A base filosófica do Lean aplicada à gestão de projetos públicos.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-12">
                    ${theoryData.cultura.principios.map((p, i) => `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border text-center hover:border-blue-400 transition-all cursor-default">
                            <div class="text-blue-600 font-black mb-1">${i+1}</div>
                            <div class="text-sm font-bold text-slate-800">${p.t}</div>
                            <div class="text-[10px] text-slate-500 mt-1">${p.d}</div>
                        </div>
                    `).join('')}
                </div>

                <div class="mb-10">
                    <h3 class="text-xl font-bold text-slate-800 mb-6">Enxergando a 'Muda' (Desperdício) no Saneamento</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        ${theoryData.cultura.desperdicios.map(w => `
                            <div class="glass-card p-5 rounded-3xl border hover:shadow-lg transition-all group">
                                <div class="text-3xl mb-3 group-hover:scale-110 transition-transform">${w.i}</div>
                                <h4 class="font-bold text-slate-900 mb-1">${w.t}</h4>
                                <p class="text-[10px] text-slate-500 mb-3">${w.d}</p>
                                <div class="bg-blue-50 p-2 rounded-xl text-[10px] text-blue-700 italic border border-blue-100">
                                    Ex: ${w.d}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderVSM(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Value Stream Mapping (VSM)</h2>
                    <p class="text-slate-600">Mapear o fluxo é o primeiro passo para otimizar. O VSM diferencia o <strong>Tempo de Valor Agregado (VA)</strong> do <strong>Lead Time total</strong>.</p>
                </div>

                <div class="bg-white p-8 rounded-[30px] shadow-sm border mb-8">
                    <h3 class="font-bold text-lg mb-6 flex items-center gap-2">Simulador de Eficiência do Processo <span class="text-xs bg-slate-100 px-2 py-1 rounded">MBA Projects</span></h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                        <div class="space-y-4">
                            <h4 class="text-sm font-bold text-emerald-600 uppercase">Etapas com Valor (VA)</h4>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400">Escavação (min)</label>
                                <input type="number" id="v1" value="45" oninput="runVSM()" class="w-full p-2 bg-emerald-50 border-emerald-100 border rounded-lg text-sm focus:outline-emerald-500">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400">Troca de Tubo (min)</label>
                                <input type="number" id="v2" value="30" oninput="runVSM()" class="w-full p-2 bg-emerald-50 border-emerald-100 border rounded-lg text-sm focus:outline-emerald-500">
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h4 class="text-sm font-bold text-amber-600 uppercase">Esperas/Desperdícios (NVA)</h4>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400">Espera Autorização (min)</label>
                                <input type="number" id="n1" value="120" oninput="runVSM()" class="w-full p-2 bg-amber-50 border-amber-100 border rounded-lg text-sm focus:outline-amber-500">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400">Atraso Material (min)</label>
                                <input type="number" id="n2" value="180" oninput="runVSM()" class="w-full p-2 bg-amber-50 border-amber-100 border rounded-lg text-sm focus:outline-amber-500">
                            </div>
                        </div>

                        <div class="flex flex-col justify-center items-center bg-slate-50 rounded-3xl p-6 border border-dashed border-slate-300">
                            <div class="text-[10px] font-bold text-slate-500 uppercase">Eficiência (PCE)</div>
                            <div id="pce-score" class="text-5xl font-black text-blue-600">0%</div>
                            <p class="text-[10px] text-slate-400 mt-2 text-center">Meta Lean: Superar 20% em serviços de campo</p>
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="vsmChart"></canvas>
                    </div>
                </div>

                <div class="bg-slate-900 text-white p-6 rounded-3xl">
                    <h4 class="font-bold mb-2">Conceitos VSM (Lembrete do Professor):</h4>
                    <ul class="text-sm space-y-2 opacity-80">
                        <li>• <strong>Lead Time:</strong> Tempo total do processo (da solicitação à entrega).</li>
                        <li>• <strong>PCE:</strong> (Tempo VA / Lead Time) * 100.</li>
                        <li>• <strong>Estado Futuro:</strong> Onde desenhamos o processo removendo os 'NVA' identificados acima.</li>
                    </ul>
                </div>
            `;
            setTimeout(runVSM, 100);
        }

        function runVSM() {
            const v1 = parseFloat(document.getElementById('v1').value) || 0;
            const v2 = parseFloat(document.getElementById('v2').value) || 0;
            const n1 = parseFloat(document.getElementById('n1').value) || 0;
            const n2 = parseFloat(document.getElementById('n2').value) || 0;

            const totalVA = v1 + v2;
            const totalNVA = n1 + n2;
            const leadTime = totalVA + totalNVA;
            const pce = leadTime > 0 ? (totalVA / leadTime) * 100 : 0;

            document.getElementById('pce-score').innerText = pce.toFixed(1) + '%';

            const ctx = document.getElementById('vsmChart').getContext('2d');
            if (charts.vsm) charts.vsm.destroy();
            charts.vsm = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Valor Agregado (Trabalho)', 'Não Agrega Valor (Esperas)'],
                    datasets: [{
                        data: [totalVA, totalNVA],
                        backgroundColor: ['#10b981', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    cutout: '70%'
                }
            });
        }

        function renderCausa(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Root Cause Analysis (RCA)</h2>
                    <p class="text-slate-600">Não aceite a primeira resposta. O Lean exige que busquemos a origem do problema.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                    <!-- Pareto -->
                    <div class="bg-white p-8 rounded-[30px] shadow-sm border">
                        <h3 class="font-bold text-slate-800 mb-2 text-sm uppercase">Pareto (80/20)</h3>
                        <p class="text-xs text-slate-500 mb-6">Foque nos motivos que geram a maioria das reclamações de interrupção.</p>
                        <div class="chart-container">
                            <canvas id="paretoChart"></canvas>
                        </div>
                    </div>

                    <!-- 5 Whys -->
                    <div class="bg-white p-8 rounded-[30px] shadow-sm border flex flex-col">
                        <h3 class="font-bold text-slate-800 mb-4 text-sm uppercase">Os 5 Porquês (Aplicação)</h3>
                        <div class="flex-1 space-y-4">
                            <div class="bg-red-50 p-4 rounded-2xl border border-red-100">
                                <div class="text-[10px] font-bold text-red-800">SINTOMA</div>
                                <div class="text-sm font-bold">O gerador da Estação de Tratamento falhou.</div>
                            </div>
                            <div class="space-y-2 text-sm">
                                <div class="p-2 border-b">1. Por quê? (Fusível queimou por sobrecarga)</div>
                                <div class="p-2 border-b">2. Por quê? (O rolamento estava mal lubrificado)</div>
                                <div class="p-2 border-b">3. Por quê? (Não há óleo suficiente na bomba)</div>
                                <div class="p-2 border-b">4. Por quê? (O lubrificador automático falhou)</div>
                                <div class="p-2 bg-blue-50 text-blue-900 font-bold rounded-lg border border-blue-200">5. Por quê? (CAUSA RAIZ: Não há rotina de inspeção para o lubrificador)</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[30px] shadow-sm border">
                    <h3 class="font-bold text-slate-800 mb-6 text-sm uppercase">Diagrama de Ishikawa (Espinha de Peixe)</h3>
                    <div class="overflow-x-auto">
                        <div class="min-w-[800px] flex flex-col gap-4">
                            <!-- 6M Categories -->
                            <div class="grid grid-cols-3 gap-8">
                                <div class="border-b-4 border-blue-500 pb-2 text-center">
                                    <h4 class="font-bold text-sm">Método</h4>
                                    <p class="text-[10px] text-slate-500">Procedimentos falhos</p>
                                </div>
                                <div class="border-b-4 border-blue-500 pb-2 text-center">
                                    <h4 class="font-bold text-sm">Máquina</h4>
                                    <p class="text-[10px] text-slate-500">Manutenção vencida</p>
                                </div>
                                <div class="border-b-4 border-blue-500 pb-2 text-center">
                                    <h4 class="font-bold text-sm">Mão de Obra</h4>
                                    <p class="text-[10px] text-slate-500">Falta de treinamento</p>
                                </div>
                            </div>
                            <!-- Central Arrow -->
                            <div class="h-1 bg-slate-900 w-full relative">
                                <div class="absolute right-0 top-1/2 -translate-y-1/2 bg-slate-900 text-white px-4 py-2 font-bold rounded">PROBLEMA</div>
                            </div>
                            <div class="grid grid-cols-3 gap-8">
                                <div class="border-t-4 border-blue-500 pt-2 text-center">
                                    <h4 class="font-bold text-sm">Material</h4>
                                    <p class="text-[10px] text-slate-500">Tubos fora da norma</p>
                                </div>
                                <div class="border-t-4 border-blue-500 pt-2 text-center">
                                    <h4 class="font-bold text-sm">Medida</h4>
                                    <p class="text-[10px] text-slate-500">Indicadores errados</p>
                                </div>
                                <div class="border-t-4 border-blue-500 pt-2 text-center">
                                    <h4 class="font-bold text-sm">Meio Ambiente</h4>
                                    <p class="text-[10px] text-slate-500">Clima (Chuva forte)</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(initPareto, 100);
        }

        function initPareto() {
            const ctx = document.getElementById('paretoChart').getContext('2d');
            if (charts.pareto) charts.pareto.destroy();
            charts.pareto = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Vazamentos', 'Falta de Água', 'Qualidade/Sabor', 'Contas Altas', 'Outros'],
                    datasets: [
                        { label: 'Qtd Reclamações', data: [150, 80, 20, 15, 5], backgroundColor: '#3b82f6', order: 2 },
                        { label: '% Acumulada', data: [55, 85, 92, 98, 100], type: 'line', borderColor: '#f59e0b', yAxisID: 'y1', order: 1 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true }, y1: { position: 'right', max: 100, min: 0 } }
                }
            });
        }

        function renderFerramentas(el) {
            el.innerHTML = `
                <div class="theory-block">
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Ferramentas Lean</h2>
                    <p class="text-slate-600">A 'caixa de ferramentas' para colocar a cultura em prática.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-3xl border shadow-sm hover:border-blue-400 transition-colors">
                        <div class="text-blue-600 font-black text-xl mb-2">5S</div>
                        <p class="text-sm font-bold mb-2">Organização e Disciplina</p>
                        <p class="text-xs text-slate-500">Utilização, Ordenação, Limpeza, Saúde e Autodisciplina. Crítico em canteiros de obra.</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border shadow-sm hover:border-blue-400 transition-colors">
                        <div class="text-blue-600 font-black text-xl mb-2">Kanban</div>
